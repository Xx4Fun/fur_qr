<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Found a Pet?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        
        <!-- Loading State -->
        <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-deep-purple-500 mb-4 border-indigo-600"></div>
            <p class="text-gray-500 font-medium">Loading pet details...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white z-50 p-6 text-center">
            <svg class="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Tag Not Found</h2>
            <p id="error-message" class="text-gray-600">This tag is invalid or inactive.</p>
        </div>

        <!-- Content State -->
        <div id="content" class="hidden flex flex-col h-full">
            <!-- Header Image -->
            <div class="w-full h-64 bg-gray-200 relative">
                <img id="pet-photo" src="" alt="Pet Photo" class="w-full h-full object-cover hidden">
                <div id="no-photo" class="absolute inset-0 flex items-center justify-center bg-indigo-100 hidden">
                    <svg class="w-20 h-20 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.514M14 10l-2 2"></path></svg>
                </div>
            </div>

            <!-- Pet Info -->
            <div class="p-6 flex-grow -mt-6 bg-white rounded-t-3xl relative z-10">
                <div class="flex justify-between items-end mb-4">
                    <h1 id="pet-name" class="text-4xl font-extrabold text-gray-900">Name</h1>
                </div>
                
                <div class="bg-indigo-50 rounded-xl p-4 mb-6">
                    <h3 class="text-sm font-bold text-indigo-800 uppercase mb-1">Public Notes</h3>
                    <p id="pet-notes" class="text-gray-700">No special notes provided.</p>
                </div>

                <p class="text-center text-gray-500 text-sm mb-6">
                    If you found this pet, please tap the button below. The owner will instantly receive a notification with your intent to help.
                </p>

                <!-- Action Button -->
                <button id="notify-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition duration-300 flex items-center justify-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    Notify Owner I Found Them!
                </button>

                <!-- Success Message -->
                <div id="success-msg" class="hidden mt-4 p-4 bg-green-100 text-green-800 rounded-xl text-center font-medium">
                    Owner has been notified! Please stay with the pet.
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
